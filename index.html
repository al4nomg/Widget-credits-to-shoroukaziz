<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greeting2</title>
    <style>
        /*CSS RESETS*/
body{
    background-color: #191919;
    line-height: 1.6;
}
h1 {
    margin-top: 0;
}
/*CSS START*/
.full-table {
    display: table;
    height: 100%;
    width: 100%;
}
.table-cell {
    display: table-cell;
    vertical-align: middle;
    text-align: center;
}
.card {
    padding: 10px 25px 10px 25px;
    border-radius: 10px;
    background: #2f2f2f;
    width: 85vw;
    color: #e6e6e5;
    display: inline-block;
    box-shadow: 2px 2px 1px 0px #111111;
}
.card:hover {
    margin-top: 2px;
    box-shadow: none;
}
.clock {
    display: inline;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.8em;
    letter-spacing: 0.02em;
}
.time {
    display: inline;
    min-width: 37px;
}
.colon {
    font-size: 1.1em;
    display: inline-block;
    opacity: 0.35;
}
.date {
    display: inline;
    min-width: 162px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.7em;
    padding-right: 30px;
    letter-spacing: 0.01em;
}
.greet{
    display: inline;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 1.5rem;
    padding-right: 30px;
    letter-spacing: 0.01em;
    opacity: 0.65;
}
    </style>
</head>
<body>

<div class="full-table">
  <div class="table-cell">
    
    <div class="card">
        <div class="greet" id="greet"></div>
      <div class="date" id="date"></div>
      <div class="clock">
        <div class="time" id="hour"></div>
        <div class="colon">:</div>
        <div class="time" id="min"></div>
        <div class="colon">:</div>
        <div class="time" id="sec"></div>
      </div>
    </div>
    
  </div>
</div>
<script>
    function date() {
var today = new Date();
document.getElementById('date').innerHTML = today.toDateString();
}
function clock() {
var today = new Date();
var hour = zeros(twelveHour(today.getHours()));
var minutes = zeros(today.getMinutes());
var seconds = zeros(today.getSeconds());
if(today.getHours() >=12){
    seconds+=" pm"
}
else{
    seconds+=" am"
}
hrs = today.getHours();
if (hrs < 12)
        greet = 'Good Morning, Alan  ';
    else if (hrs >= 12 && hrs <= 17)
        greet = 'Good Afternoon, Alan ';
    else if (hrs >= 17 && hrs <= 24)
        greet = 'Good Evening, Alan  ';
document.getElementById('greet').innerHTML = greet;
document.getElementById('hour').innerHTML = hour;
document.getElementById('min').innerHTML = minutes;
document.getElementById('sec').innerHTML = seconds;
}
function twelveHour(hour) {
if (hour > 12) {
    return hour -= 12 
} else if (hour === 0) {
    return hour = 12;
} else {
    return hour
}
}
    
function zeros(num) {
if (num < 10) {
    num = '0' + num
};
return num;
}
function dateTime() {
date();
clock();
setTimeout(dateTime, 500);
}
dateTime()
</script>
</body>
</html>
